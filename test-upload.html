<!DOCTYPE html>
<html lang="pap">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PapiaText Test</title>

<style>
body{
font-family:Arial,sans-serif;
padding:40px;
max-width:800px;
margin:auto;
}

button{
padding:12px 20px;
cursor:pointer;
}

#result{
margin-top:20px;
white-space:pre-wrap;
background:#f5f5f5;
padding:20px;
border-radius:10px;
}
</style>

</head>
<body>

<h1>PapiaText Test Upload</h1>

<input type="file" id="audioFile">

<button onclick="uploadFile()">
Transkribí
</button>

<div id="result"></div>

<script>

async function uploadFile(){

const fileInput = document.getElementById('audioFile');
const file = fileInput.files[0];

if(!file){
alert('Selektá un archivo promé');
return;
}

const formData = new FormData();
formData.append('file', file);

document.getElementById('result').innerText =
'Transkribiendo...';

try{

const response = await fetch(
'https://papiatext-transcribe.info-victoryhousing.workers.dev/',
{
method:'POST',
body:formData
}
);

const data = await response.json();

document.getElementById('result').innerText =
JSON.stringify(data,null,2);

}catch(error){

document.getElementById('result').innerText =
error.message;

}

}

</script>

</body>
</html>
