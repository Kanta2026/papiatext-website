<!DOCTYPE html><html lang="pap">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PapiaText Transcribe</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>

body{
font-family:'Poppins',sans-serif;
background:#f7f7f7;
margin:0;
padding:0;
color:#0f2747;
}

.container{
max-width:900px;
margin:60px auto;
padding:30px;
}

.logo{
font-size:3rem;
font-weight:800;
text-align:center;
margin-bottom:10px;
}

.logo span{
color:#ff7a00;
}

.subtitle{
text-align:center;
font-size:1.2rem;
margin-bottom:40px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

input[type=file]{
width:100%;
padding:15px;
margin-bottom:20px;
}

button{
background:#ff7a00;
color:white;
border:none;
padding:15px 25px;
border-radius:10px;
font-size:1rem;
font-weight:700;
cursor:pointer;
}

textarea{
width:100%;
height:300px;
margin-top:25px;
padding:15px;
font-size:1rem;
border-radius:10px;
border:1px solid #ddd;
resize:vertical;
}

</style></head><body><div class="container"><div class="logo">
Papia<span>Text</span>
</div><div class="subtitle">
Transkribí audio na teksto den Papiamentu
</div><div class="card"><input
type="file"
id="audioFile"
accept="audio/*">

<button id="transcribeBtn">
Transcribe
</button><textarea
id="result"
placeholder="Resultado lo aparece aki..."></textarea></div></div><script>

document.getElementById("transcribeBtn").addEventListener("click", async () => {

const fileInput =
document.getElementById("audioFile");

if (!fileInput.files.length) {
alert("Selektá un audio promé.");
return;
}

const file = fileInput.files[0];

const formData = new FormData();
formData.append("file", file);

document.getElementById("result").value =
"Transkribiendo...";

try {

const response = await fetch(
"https://papiatext-transcribe.info-victoryhousing.workers.dev",
{
method: "POST",
body: formData
}
);

const data = await response.json();

document.getElementById("result").value =
data.transcription || "No tin resultado.";

}
catch(error){

document.getElementById("result").value =
"Error: " + error.message;

}

});

</script></body>
</html>
