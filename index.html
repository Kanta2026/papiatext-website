<!DOCTYPE html>
<html lang="pap">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PapiaText</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:#f7f7f7;
color:#0f2747;
overflow-x:hidden;
}

a{
text-decoration:none;
}

/* =========================
   NAVBAR
========================= */

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
background:rgba(255,255,255,.95);
backdrop-filter:blur(10px);
box-shadow:0 2px 15px rgba(0,0,0,.08);
}

.nav-container{
max-width:1400px;
margin:auto;
padding:18px 30px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo-nav{
font-size:2.2rem;
font-weight:800;
color:#0f2747;
}

.logo-nav span{
color:#ff7a00;
}

.nav-menu{
display:flex;
gap:40px;
list-style:none;
}

.nav-menu a{
color:#0f2747;
font-weight:600;
transition:.3s;
}

.nav-menu a:hover{
color:#ff7a00;
}

.nav-buttons{
display:flex;
gap:14px;
}

.btn-login{
padding:12px 24px;
border:2px solid #0f2747;
border-radius:12px;
color:#0f2747;
font-weight:700;
background:white;
}

.btn-register{
padding:12px 24px;
border-radius:12px;
background:#ff7a00;
color:white;
font-weight:700;
}

/* =========================
   HERO
========================= */

.hero{
min-height:100vh;
display:flex;
align-items:center;
position:relative;
padding-top:100px;

background:
linear-gradient(
rgba(255,255,255,.15),
rgba(255,255,255,.25)
),
url('papiatext-hero-curacao.png');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.container{
max-width:1400px;
margin:auto;
padding:0 40px;
}

.hero-content{
display:flex;
justify-content:space-between;
align-items:center;
gap:60px;
padding-top:50px;
}

.hero-left{
flex:1;
max-width:700px;
}

.logo-main{
font-size:6rem;
font-weight:800;
line-height:1;
color:#0f2747;
margin-bottom:20px;
}

.logo-main span{
color:#ff7a00;
}

.hero-title{
font-size:3.2rem;
font-weight:800;
line-height:1.15;
margin-bottom:20px;
color:#0f2747;
}

.hero-slogan{
font-size:1.8rem;
font-weight:700;
color:#ff7a00;
margin-bottom:18px;
}

.hero-text{
font-size:1.3rem;
line-height:1.7;
max-width:650px;
margin-bottom:30px;
}

.btn-contact{
display:inline-flex;
align-items:center;
gap:12px;
background:#ff7a00;
color:white;
padding:18px 30px;
border-radius:14px;
font-weight:700;
font-size:1.1rem;
box-shadow:0 10px 25px rgba(255,122,0,.30);
}

.hero-right{
display:flex;
justify-content:flex-end;
align-items:center;
flex:1;
}

.info-card{
background:rgba(255,255,255,.95);
padding:40px;
border-radius:24px;
width:430px;
box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.info-card h3{
font-size:2rem;
color:#ff7a00;
margin-bottom:15px;
}

.info-card p{
font-size:1.2rem;
line-height:1.8;
}

/* =========================
   SERVICES
========================= */

.services{
background:#f8f8f8;
padding:70px 0 50px;
}

.section-title{
text-align:center;
font-size:3rem;
font-weight:800;
color:#0f2747;
margin-bottom:12px;
}

.section-line{
width:70px;
height:5px;
background:#ff7a00;
margin:0 auto 50px;
border-radius:50px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}
